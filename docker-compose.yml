services:
  solr:
    image: solr:9.10
    ports:
      - "8983:8983"
    environment:
      SOLR_MODULES: analysis-extras
      SOLR_OPTS: -Dsolr.config.lib.enabled=true -Dsolr.allowPaths=/data
    volumes:
      - ./solr/lib:/opt/solr/contrib/ocrhighlighting:ro
      - ./solr/configset:/opt/solr/server/solr/configsets/meastlib:ro
      - ./data:/data:ro
      - solr-data:/var/solr
    command:
      - solr-precreate
      - meastlib
      - /opt/solr/server/solr/configsets/meastlib

  cantaloupe:
    image: uclalibrary/cantaloupe:5.0.6-3
    ports:
      - "8182:8182"
    environment:
      CANTALOUPE_SOURCE_STATIC: FilesystemSource
      CANTALOUPE_FILESYSTEMSOURCE_BASICLOOKUPSTRATEGY_PATH_PREFIX: /imageroot/items/
      CANTALOUPE_ENDPOINT_IIIF_3_ENABLED: "true"
    volumes:
      - ./data:/imageroot:ro

  admin-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SOLR_URL: http://solr:8983/solr/meastlib
      CANTALOUPE_URL: http://cantaloupe:8182/
      INBOX_DIR: /inbox
      OCR_WORKERS: ${OCR_WORKERS:-2}
      MEASTLIB_SEARCH_VISIBILITY: ${MEASTLIB_SEARCH_VISIBILITY:-all}
      MEASTLIB_CATALOG_EMAIL: ${MEASTLIB_CATALOG_EMAIL:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ${MEASTLIB_INBOX_DIR:-./data/inbox}:/inbox:ro
    depends_on:
      - solr
      - cantaloupe

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data:/data:ro
    depends_on:
      - solr
      - cantaloupe
      - admin-api

volumes:
  solr-data:
