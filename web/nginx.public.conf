log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request",'
    '"status":$status,"bytes":$body_bytes_sent,"request_time":$request_time,'
    '"referer":"$http_referer","user_agent":"$http_user_agent"}';

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    access_log /var/log/nginx/access.log json_combined;

    location / {
        try_files $uri /index.html;
    }

    location /data/ {
        alias /data/;
        limit_except GET HEAD { deny all; }
        add_header X-Content-Type-Options nosniff always;
        add_header Access-Control-Allow-Origin *;
    }

    location ~ ^/api/(health|search|catalog/|iiif/) {
        limit_except GET HEAD { deny all; }
        proxy_pass http://public-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ { return 404; }

    location /iiif/ {
        limit_except GET HEAD { deny all; }
        proxy_pass http://public-cantaloupe:8182;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
