server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 2g;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri /index.html;
    }

    # Item data: manifests + OCR text (read-only)
    location /data/ {
        alias /data/;
        add_header Access-Control-Allow-Origin *;
    }

    # Local administration API: uploads, processing jobs, and tool status.
    location /api/ {
        proxy_pass http://admin-api:8000;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Search API — only /select is exposed; Solr admin stays internal
    location /solr/meastlib/select {
        proxy_pass http://solr:8983/solr/meastlib/select;
        proxy_set_header Host $host;
    }

    # IIIF images
    location /iiif/ {
        # No URI suffix: preserve encoded slashes in IIIF identifiers.
        proxy_pass http://cantaloupe:8182;
        # Preserve the public port. Cantaloupe includes this host in info.json;
        # dropping :8080 makes OpenSeadragon request tiles from port 80.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
